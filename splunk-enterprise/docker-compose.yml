version: "3.6"

services:
  splunk:
    image: splunk/splunk:latest
    container_name: splunk_standalone
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=YourSecurePassword123!
    ports:
      - "8000:8000"    # Splunk Web UI
      - "8089:8089"    # Management Port / REST API
      - "9997:9997"    # Splunk Indexer Port (for Forwarders)
      - "1514:1514/udp" # Network Syslog Input
    volumes:
      - {APP_DATA_DIR}/etc:/opt/splunk/etc
      - {APP_DATA_DIR}/var:/opt/splunk/var
    restart: unless-stopped

